[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/review"
  to = "https://search.google.com/local/writereview?placeid=ChIJAxR3lwir_BURVIDAw3qPaWM"
  status = 302
  force = true

[[redirects]]
  from = "/api/state"
  to = "/.netlify/functions/state"
  status = 200

[[redirects]]
  from = "/api/push"
  to = "/.netlify/functions/push-subscription"
  status = 200

[[redirects]]
  from = "/api/clinics"
  to = "/.netlify/functions/clinics"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"
