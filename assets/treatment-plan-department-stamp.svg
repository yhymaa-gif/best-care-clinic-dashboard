<svg xmlns="http://www.w3.org/2000/svg" width="420" height="420" viewBox="0 0 420 420" role="img" aria-labelledby="title description">
  <title id="title">ختم قسم الخطط العلاجية في عيادات أفضل عناية</title>
  <desc id="description">ختم أزرق دائري مكتوب فيه أفضل عناية، عيادات أسنان استشارية، قسم الخطط العلاجية</desc>
  <defs>
    <filter id="ink" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency=".72" numOctaves="2" seed="19" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.25" xChannelSelector="R" yChannelSelector="G"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .78"/>
      </feComponentTransfer>
    </filter>
    <style>
      .ink{fill:none;stroke:#155b96;stroke-linecap:round;stroke-linejoin:round}
      .text{fill:#155b96;font-family:"IBM Plex Sans Arabic","Tahoma","Arial",sans-serif;text-anchor:middle;direction:rtl}
    </style>
  </defs>
  <g filter="url(#ink)" opacity=".9" transform="rotate(-1.4 210 210)">
    <circle class="ink" cx="210" cy="210" r="181" stroke-width="9"/>
    <circle class="ink" cx="210" cy="210" r="165" stroke-width="2.8" stroke-dasharray="2 8"/>
    <circle class="ink" cx="210" cy="210" r="144" stroke-width="3.8"/>
    <path class="ink" stroke-width="6" d="M179 105c-19 11-29 33-25 56 4 23 15 37 19 67 4 28 14 49 25 49 10 0 7-48 18-48s8 48 18 48c11 0 21-21 25-49 4-30 15-44 19-67 4-23-6-45-25-56-15-9-26 4-37 4s-22-13-37-4z"/>
    <path class="ink" stroke-width="2.5" d="M169 144c11-18 28-16 43-8m9 0c12-8 25-9 36 1"/>
    <text class="text" x="210" y="307" font-size="38" font-weight="800">أفضل عناية</text>
    <text class="text" x="210" y="338" font-size="22" font-weight="700">عيادات أسنان استشارية</text>
    <path class="ink" stroke-width="3" d="M91 359h238"/>
    <text class="text" x="210" y="384" font-size="22" font-weight="800">قسم الخطط العلاجية</text>
    <circle cx="71" cy="210" r="5" fill="#155b96"/>
    <circle cx="349" cy="210" r="5" fill="#155b96"/>
  </g>
</svg>
