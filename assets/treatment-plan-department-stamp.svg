<svg xmlns="http://www.w3.org/2000/svg" width="420" height="420" viewBox="0 0 420 420" role="img" aria-labelledby="title description">
  <title id="title">ختم قسم الخطط العلاجية في عيادات أفضل عناية</title>
  <desc id="description">ختم أزرق دائري مكتوب فيه أفضل عناية، عيادات أسنان استشارية، قسم الخطط العلاجية</desc>
  <defs>
    <filter id="ink" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency=".72" numOctaves="2" seed="19" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.25" xChannelSelector="R" yChannelSelector="G"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .78"/>
      </feComponentTransfer>
    </filter>
    <style>
      .ink{fill:none;stroke:#155b96;stroke-linecap:round;stroke-linejoin:round}
      .text{fill:#155b96;font-family:"IBM Plex Sans Arabic","Tahoma","Arial",sans-serif;text-anchor:middle;direction:rtl}
    </style>
  </defs>
  <g transform="rotate(-1.2 210 210)" opacity=".82">
    <g filter="url(#ink)">
      <circle class="ink" cx="210" cy="210" r="181" stroke-width="9"/>
      <circle class="ink" cx="210" cy="210" r="164" stroke-width="3" stroke-dasharray="3 9"/>
      <path class="ink" stroke-width="6" d="M180 80c-19 11-27 31-23 52 3 19 14 35 18 58 4 27 14 46 24 46 10 0 6-41 16-41s6 41 16 41c10 0 20-19 24-46 4-23 15-39 18-58 4-21-4-41-23-52-14-8-25 5-35 5s-21-13-35-5z"/>
      <path class="ink" stroke-width="2.5" d="M171 119c11-17 27-15 41-7m8 0c12-8 25-8 35 2"/>
      <path class="ink" stroke-width="3" d="M106 316h208"/>
      <circle cx="69" cy="210" r="5" fill="#155b96"/>
      <circle cx="351" cy="210" r="5" fill="#155b96"/>
    </g>
    <text class="text" x="210" y="275" font-size="34" font-weight="800">أفضل عناية</text>
    <text class="text" x="210" y="303" font-size="19" font-weight="700">عيادات أسنان استشارية</text>
    <text class="text" x="210" y="344" font-size="19" font-weight="800">قسم الخطط العلاجية</text>
  </g>
</svg>
