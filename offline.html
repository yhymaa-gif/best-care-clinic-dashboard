<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#135f47">
  <title>Best Care Flow — دون اتصال</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:linear-gradient(160deg,#f8fbfa,#e8f2ed);font-family:Tahoma,"Segoe UI",Arial,sans-serif;color:#17352a}.card{width:min(520px,100%);padding:34px;border-radius:24px;background:#fff;border:1px solid #dce7e1;box-shadow:0 20px 50px rgba(29,73,55,.13);text-align:center}.logo{width:92px;height:92px;object-fit:contain;border-radius:20px;border:1px solid #dce7e1;padding:6px}h1{color:#145e46;margin:18px 0 8px}p{color:#667a71;line-height:1.8}button{border:0;border-radius:12px;padding:12px 18px;background:#176344;color:#fff;font:800 15px inherit;cursor:pointer}
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="./best-care-logo.png" alt="Best Care">
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>واجهة التطبيق محفوظة على الجهاز، لكن بيانات المرضى لا تُعرض من ذاكرة قديمة. أعد المحاولة بعد عودة الاتصال لحماية دقة قائمة المواعيد.</p>
    <button type="button" onclick="location.reload()">إعادة المحاولة</button>
  </main>
</body>
</html>
